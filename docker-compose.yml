version: '3.8'
services:
  web:
    image: php:8.3-apache
    container_name: invoice-php-web
    volumes:
      - ./Invoice-System-In-PHP-main:/var/www/html
    ports:
      - "8080:80"
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    depends_on:
      - db
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Install required PHP extensions on container start
    command: >
      bash -c "docker-php-ext-install mysqli && apache2-foreground"
  db:
    image: mysql:8.0
    container_name: invoice-mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: invoice_db
      MYSQL_USER: invoice_user
      MYSQL_PASSWORD: invoice_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
